domain:
  entry:
    id: workflow-init
    directory: workflow-status/init
    outputs:
      - file: "@bmm-workflow-status.yaml"
        description: BMM workflow tracking status
  phases:
    discovery:
      label: "PHASE 1: DISCOVERY"
      directory: 1-analysis
      optional: true
      behavior: parallel
    planning:
      label: "PHASE 2: PLANNING"
      directory: 2-plan-workflows
      behavior: sequential
      workflow_sequence:
        - prd
        - create-ux-design
    solutioning:
      label: "PHASE 3: SOLUTIONING"
      directory: 3-solutioning
      behavior: sequential
      workflow_sequence:
        - architecture
        - create-epics-and-stories
        - implementation-readiness
    implementation:
      label: "PHASE 4: IMPLEMENTATION"
      directory: 4-implementation
      behavior: nested_loops
      structure:
        entry: sprint-planning
        epic_loop:
          frequency: per-epic
          pre_story:
            sequence: []
          story_loop:
            frequency: per-story
            sequence:
              - create-story
              - dev-story
              - code-review
            feedback_loops:
              - from: code-review
                to: dev-story
                label: fixes
          post_story:
            - workflow: retrospective
              optional: true
        release_gate:
          optional: true
          optional_group: testarch
        outer_feedback:
          - from: retrospective
            to: epic_loop
            label: next_epic
  quick_flow:
    directory: bmad-quick-flow
    description: Fast-track path bypassing full discovery/planning
  optional_groups:
    testarch:
      description: >-
        Optional quality superstructure for BMM Method and Enterprise tracks. TEA (Test Architect) is the only
        multi-phase agent, operating across Phase 3 (solutioning), Phase 4 (implementation), and Release Gate. Quick
        Flow projects typically skip these workflows.
      agent: tea
      directory: testarch
      applicable_tracks:
        - bmm-method
        - enterprise
      integration:
        solutioning:
          after: create-epics-and-stories
          before: implementation-readiness
          sequence:
            - framework
            - ci
        implementation:
          epic_start:
            after: sprint-planning
            sequence:
              - test-design
          story_cycle:
            - position: before
              anchor: dev-story
              workflows:
                - atdd
            - position: after
              anchor: dev-story
              workflows:
                - automate
                - test-review
                - trace
        release_gate:
          workflows:
            - nfr-assess
            - trace
  tracking_systems:
    workflow_status:
      file: "@bmm-workflow-status.yaml"
      covers:
        - discovery
        - planning
        - solutioning
      description: Phase-level progress tracking via artifact detection
      entity: workflow
      states:
        - pending
        - complete
        - skipped
    sprint_status:
      file: "@sprint-status.yaml"
      covers:
        - implementation
      description: Per-story iterative tracking with explicit state machine
      entities:
        epic:
          states:
            - backlog
            - in-progress
            - done
        story:
          states:
            - backlog
            - drafted
            - ready-for-dev
            - in-progress
            - review
            - done
        retrospective:
          states:
            - optional
            - completed
    handoff:
      from: workflow_status
      to: sprint_status
      at_workflow: sprint-planning
      reason: Implementation is iterative per-story; requires different tracking model

